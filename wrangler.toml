name = "consultincusa-web"
compatibility_date = "2025-05-01"
pages_build_output_dir = "dist"

# D1 binding for Pages Functions
# After running `npm run db:create`, paste the returned database_id below
[[d1_databases]]
binding = "DB"
database_name = "consultincusa_db"
database_id = "REPLACE_WITH_D1_ID_AFTER_db:create"

# Public-facing env vars (non-secret, ok to commit)
[vars]
PUBLIC_SITE_URL = "https://consultincusa.com"

# Secrets (set via `wrangler pages secret put NAME` — DO NOT commit values)
#  - SLACK_LEAD_WEBHOOK  : Slack incoming webhook URL for #leads channel
