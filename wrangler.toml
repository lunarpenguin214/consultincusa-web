name = "consultincusa-web"
main = "worker.ts"
compatibility_date = "2025-05-01"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "consultincusa_db"
database_id = "49453400-a050-4fb8-810d-901cb63a7421"

[vars]
PUBLIC_SITE_URL = "https://consultincusa.com"

# Secrets (set via `wrangler secret put NAME` — DO NOT commit values):
#  - SLACK_LEAD_WEBHOOK  : Slack incoming webhook URL for #leads channel
